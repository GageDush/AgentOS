name: ci

on:
  pull_request:
    branches: [main, "pivot/**"]
  push:
    branches: [main, "pivot/**"]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm sanitize:check
      - run: pnpm agentos:validate-profiles
      - run: pnpm env:check
      - run: pnpm typecheck
      - run: pnpm test
