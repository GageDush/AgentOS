name: ci

on:
  pull_request:
    branches: [main, "pivot/**"]
  push:
    branches: [main, "pivot/**"]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install semgrep for security gate tests
        run: pip install semgrep
      - run: pnpm sanitize:check
      - run: pnpm agentos:validate-profiles
      - run: pnpm agentos:bench-profiles
      - run: pnpm agentos:bench-pipeline
      - run: pnpm env:check
      - run: pnpm typecheck
      - run: pnpm test
        env:
          AGENTOS_SEMGREP_GATE: "false"
          AGENTOS_CLASSIFIER_TIER2: "false"
      - run: pnpm mission:smoke
        env:
          AGENTOS_CLASSIFIER_TIER2: "false"
      - run: pnpm tool:smoke
        env:
          AGENTOS_CLASSIFIER_TIER2: "false"
      - run: pnpm agentos:bench-baseline
      - run: pnpm discord:test

  e2e:
    runs-on: ubuntu-latest
    needs: checks
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - run: pnpm test:e2e

  # Optional, non-blocking: focused LLM-router signal. The deterministic unit
  # tests (mock fetch, no Ollama) gate the router logic; a live `pnpm llm:smoke`
  # needs Ollama + the API, which CI doesn't run, so this stays continue-on-error.
  llm-smoke:
    runs-on: ubuntu-latest
    needs: checks
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: LLM router unit tests
        run: pnpm --filter @agentos/llm-router test
